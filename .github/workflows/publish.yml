name: CI / Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
        working-directory: ./packages/bat
      - name: Build
        run: npm run build --if-present
        working-directory: ./packages/bat
      - name: Run tests
        run: npm test --if-present
        working-directory: ./packages/bat

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Install
        run: npm ci
        working-directory: ./packages/bat
      - name: Build
        run: npm run build
        working-directory: ./packages/bat
      - name: Skip publish when token is missing
        if: ${{ env.NODE_AUTH_TOKEN == '' }}
        run: echo "NPM_TOKEN is not configured; npm publish skipped."
      - name: Publish
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: |
          cd packages/bat
          npm publish --access public
